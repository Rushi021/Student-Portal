{% extends "base.html" %}
{% block title %}New poll — Whiteboard{% endblock %}
{% block content %}
<h1 class="h3 mb-3">Create poll</h1>
<form method="post" class="card border-0 shadow-sm p-4" style="max-width: 32rem;">
  <div class="mb-3">
    <label class="form-label" for="question">Question</label>
    <input class="form-control" id="question" name="question" required>
  </div>
  <button class="btn btn-primary" type="submit">Create</button>
  <a class="btn btn-link" href="{{ url_for('polls.polls_list') }}">Cancel</a>
</form>
{% endblock %}
