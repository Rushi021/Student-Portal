{% extends "base.html" %}
{% block title %}Login — Whiteboard{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h1 class="h4 mb-3">Sign in</h1>
        <p class="text-muted small">Local SQLite + file uploads. Configure RDS/S3 when you deploy to AWS.</p>
        <form method="post" action="{{ url_for('auth.login', next=request.args.get('next', '')) }}">
          <div class="mb-3">
            <label class="form-label" for="email">Email</label>
            <input class="form-control" id="email" name="email" type="email" required autocomplete="username">
          </div>
          <div class="mb-3">
            <label class="form-label" for="password">Password</label>
            <input class="form-control" id="password" name="password" type="password" required autocomplete="current-password">
          </div>
          <button class="btn btn-primary w-100" type="submit">Login</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
