{% extends "base.html" %}
{% block title %}Login — Whiteboard{% endblock %}
{% block content %}
<div class="row justify-content-center align-items-center g-4">
  <div class="col-lg-5">
    <div class="card border-0 shadow-sm h-100">
      <div class="card-body p-4 p-md-5">
        <span class="badge su-badge mb-3 px-3 py-2">Whiteboard Portal</span>
        <h1 class="h3 mb-3">Welcome back</h1>
        <p class="text-muted mb-0">A single place for courses, materials, quizzes, announcements, and polls.</p>
      </div>
    </div>
  </div>
  <div class="col-md-7 col-lg-5">
    <div class="card border-0 shadow-sm">
      <div class="card-body p-4 p-md-5">
        <h2 class="h4 mb-3">Sign in</h2>
        <p class="text-muted small">Local SQLite + file uploads. Configure RDS/S3 when you deploy to AWS.</p>
        <form method="post" action="{{ url_for('auth.login', next=request.args.get('next', '')) }}">
          <div class="mb-3">
            <label class="form-label fw-semibold" for="email">Email</label>
            <input class="form-control" id="email" name="email" type="email" required autocomplete="username" placeholder="you@example.com">
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold" for="password">Password</label>
            <input class="form-control" id="password" name="password" type="password" required autocomplete="current-password" placeholder="Enter your password">
          </div>
          <button class="btn btn-primary w-100 py-2" type="submit">Login</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
