{% extends "base.html" %}
{% block title %}Grade submission — Whiteboard{% endblock %}
{% block content %}
<h1 class="h4 mb-3">{{ quiz.title }} — {{ submission.student.name }}</h1>
<div class="card border-0 shadow-sm mb-4">
  <div class="card-body">
    <h2 class="h6 text-muted">Submission</h2>
    <div style="white-space: pre-wrap;">{{ submission.submission_text or '(empty)' }}</div>
  </div>
</div>
<form method="post" class="card border-0 shadow-sm p-4" style="max-width: 24rem;">
  <div class="mb-3">
    <label class="form-label" for="score">Score</label>
    <input class="form-control" id="score" name="score" type="text" required value="{{ submission.score if submission.score is not none else '' }}">
  </div>
  <button class="btn btn-primary" type="submit">Save grade</button>
  <a class="btn btn-link" href="{{ url_for('quizzes.quizzes_submissions', quiz_id=quiz.id) }}">Cancel</a>
</form>
{% endblock %}
