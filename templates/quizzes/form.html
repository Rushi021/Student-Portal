{% extends "base.html" %}
{% block title %}New quiz — Whiteboard{% endblock %}
{% block content %}
<h1 class="h3 mb-3">Create quiz</h1>
<p class="text-muted">Students submit free-text answers; you grade manually.</p>
<form method="post" class="card border-0 shadow-sm p-4">
  <div class="mb-3">
    <label class="form-label" for="title">Title</label>
    <input class="form-control" id="title" name="title" required>
  </div>
  <div class="mb-3">
    <label class="form-label" for="description">Instructions / questions</label>
    <textarea class="form-control" id="description" name="description" rows="6"></textarea>
  </div>
  <button class="btn btn-primary" type="submit">Create</button>
  <a class="btn btn-link" href="{{ url_for('quizzes.quizzes_list') }}">Cancel</a>
</form>
{% endblock %}
